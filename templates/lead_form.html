{% extends 'base.html' %}
{% block content %}
<h4>{{ 'Editar' if lead else 'Novo' }} Lead</h4>
<form method="POST" class="mt-3" style="max-width:500px">
    <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" name="titulo" class="form-control" value="{{ lead.titulo if lead }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Cliente</label>
        <input type="text" name="cliente" class="form-control" value="{{ lead.cliente if lead }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Valor (R$)</label>
        <input type="number" step="0.01" name="valor" class="form-control" value="{{ lead.valor if lead else 0 }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
            {% for s in ['Novo', 'Em andamento', 'Ganho', 'Perdido'] %}
            <option value="{{ s }}" {{ 'selected' if lead and lead.status == s }}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-warning">Salvar</button>
    <a href="/crm" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
