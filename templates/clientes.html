{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Clientes</h4>
    <a href="/clientes/novo" class="btn btn-success"><i class="bi bi-plus"></i> Novo Cliente</a>
</div>
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Endereço</th><th>Ações</th></tr>
    </thead>
    <tbody>
        {% for c in clientes %}
        <tr>
            <td>{{ c.nome }}</td>
            <td>{{ c.email }}</td>
            <td>{{ c.telefone }}</td>
            <td>{{ c.endereco }}</td>
            <td>
                <a href="/clientes/editar/{{ c.id }}" class="btn btn-sm btn-warning">Editar</a>
                <a href="/clientes/deletar/{{ c.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Remover cliente?')">Remover</a>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-center">Nenhum cliente cadastrado</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
