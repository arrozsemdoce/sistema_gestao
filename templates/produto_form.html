{% extends 'base.html' %}
{% block content %}
<h4>{{ 'Editar' if produto else 'Novo' }} Produto</h4>
<form method="POST" class="mt-3" style="max-width:500px">
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" name="nome" class="form-control" value="{{ produto.nome if produto }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Código</label>
        <input type="text" name="codigo" class="form-control" value="{{ produto.codigo if produto }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Quantidade</label>
        <input type="number" name="quantidade" class="form-control" value="{{ produto.quantidade if produto else 0 }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Preço</label>
        <input type="number" step="0.01" name="preco" class="form-control" value="{{ produto.preco if produto }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/estoque" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
