{% extends 'base.html' %}
{% block content %}
<h4>{{ 'Editar' if cliente else 'Novo' }} Cliente</h4>
<form method="POST" class="mt-3" style="max-width:500px">
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" name="nome" class="form-control" value="{{ cliente.nome if cliente }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ cliente.email if cliente }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input type="text" name="telefone" class="form-control" value="{{ cliente.telefone if cliente }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Endereço</label>
        <input type="text" name="endereco" class="form-control" value="{{ cliente.endereco if cliente }}">
    </div>
    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="/clientes" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
